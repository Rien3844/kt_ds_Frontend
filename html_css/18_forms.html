<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>forms</title>
    <link rel="stylesheet" type="text/css" href="./18_forms.css" />
  </head>
  <body>
    <div class="grid">
      <label for="email">email</label>
      <input id="email" type="email" />

      <label for="user-password">password</label>
      <input id="user-password" type="password" />

      <label for="male">성별</label>

      <div class="vert-list">
        <input type="radio" name="gender" id="male" />
        <label for="male">남</label>
        <input type="radio" name="gender" id="female" />
        <label for="female">여</label>
        <!-- 같은 name으로 묶이면 하나의 collection이 됨. ==> 하나의 collection은 하나만 선택가능. -->
      </div>

      <label for="">가입경로</label>
      <div>
        <input type="checkbox" name="channel" id="instargram" />
        <label for="instargram">인스타그램</label>

        <input type="checkbox" name="channel" id="x" />
        <label for="x">X(구 트위터)</label>

        <input type="checkbox" name="channel" id="friends" />
        <label for="friends">지인 소개</label>

        <input type="checkbox" name="channel" id="youtube" />
        <label for="youtube">유튜브</label>
      </div>

      <label for="jobs">직업</label>
      <select id="jobs">
        <option value="">(선택)</option>
        <option value="">관련산업종사자</option>
        <option value="">일반인</option>
        <option value="">학생</option>
        <option value="">기타</option>
      </select>

      <label for="">하고 싶은 말</label>
      <textarea name="" id=""></textarea>
    </div>
  </body>
</html>
