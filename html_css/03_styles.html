<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Styles</title>
    <style type="text/css">
      div {
        color: rebeccapurple;
        font-size: 12px;
      }

      p {
        font-size: 24px;
        font-weight: 100;
      }
      span {
        background-color: wheat;
        color: green;
        font-weight: 900;
        text-decoration: underline;
      }
      h1 {
        color: #ff69b4;
      }
      h2 {
        color: olivedrab;
      }
      h3,
      h4,
      h5,
      h6 {
        color: midnightblue;
      }
    </style>
  </head>
  <body>
    <div>영역1</div>
    <div>영역2</div>

    <p>단락1</p>
    <p>단락2</p>

    <span>단어 강조 1</span>
    <span>단어 강조 2</span>

    <h1>큰 글자</h1>
    <h2>조금 큰 글자</h2>
    <h3>보통 크기의 글자</h3>
    <h4>조금 작은 글자</h4>
    <h5>더 작은 글자</h5>
    <h6>매우 작은 글자</h6>
  </body>
</html>
