<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <input />
    <p>단락을 만들어주는 p 태그</p>
    <!-- Unordered List -->
    <ul>
      <!-- Lite item -->
      <li>첫 번째 아이템</li>
      <li>두 번째 아이템</li>
      <li>세 번째 아이템</li>
    </ul>
    <!-- Divide - 화면을 나누어 영역을 구분시킨다. -->
    <div>
      <p>두 번째 단락</p>
      <p>세 번째 단락</p>
    </div>
  </body>
</html>
